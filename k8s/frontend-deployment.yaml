apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ophthalmoai
  labels:
    app: ophthalmoai
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ophthalmoai
      component: frontend
  template:
    metadata:
      labels:
        app: ophthalmoai
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ophthalmoai-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
