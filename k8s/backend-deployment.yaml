apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ophthalmoai
  labels:
    app: ophthalmoai
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ophthalmoai
      component: backend
  template:
    metadata:
      labels:
        app: ophthalmoai
        component: backend
    spec:
      containers:
        - name: backend
          image: ophthalmoai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ophthalmoai-config
            - secretRef:
                name: ophthalmoai-secrets
                optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
