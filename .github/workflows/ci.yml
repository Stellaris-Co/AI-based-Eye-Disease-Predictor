name: CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "22"

jobs:
  backend-test:
    name: Backend · pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install CPU-only PyTorch (fast install, no CUDA overhead in CI)
        run: |
          pip install --upgrade pip
          pip install torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu \
            --quiet

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          ENVIRONMENT:     test
          JWT_SECRET_KEY:  ci-test-secret-do-not-use-in-production
          DATABASE_URL:    sqlite:///./test_ophthalmoai.db
          CORS_ORIGINS:    http://localhost:5173
          FORCE_CPU:       "true"
        run: |
          pytest tests/backend/ \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  frontend-check:
    name: Frontend · lint + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build (catches JSX / import / tree-shaking errors)
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Upload build artefact (for docker-build job)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Python dependency audit
        run: |
          pip-audit \
            --requirement backend/requirements.txt \
            --desc on \
            --format markdown \
            --output pip-audit-report.md || true
          cat pip-audit-report.md

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (high + critical only)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: pip-audit-report.md
          retention-days: 14

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      backend/Dockerfile
          push:      false
          tags:      ophthalmoai-backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      frontend/Dockerfile
          push:      false
          tags:      ophthalmoai-frontend:ci
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to:   type=gha,mode=max
